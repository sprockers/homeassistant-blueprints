blueprint:
  name: Brilliant Lights
  author: Chris Wood
  description: >
    # Brilliant Lights


    *Version: 0.9.4*<p>


    A stateful lighting scene controller which triggers
    from occupancy and light switch sensors.<p>


    <details>


    - **Triggers:**
      - Occupancy/motion binary sensor or group
      - Light switch sensor or group
      - An optional binary/boolean entity or group which must be true
        otherwise the automation will not activate


    - **Key Concepts:**
      - Active State
        - Automation activates when triggers cause the lights to turn on
        - Automation remains active until occupancy is clear and the
          timer has counted down to zero
        - Active state is stored in an `input_boolean` helper
        - You must define this helper outside of the automation
        - Whilst the automation remains active for some time, the automation
          itself only runs for short periods to process triggers and run
          actions, completing the automation run each time
      - Pause State
        - The automation is paused if you turn off the lights using the light
          switch whilst the automation is in active state
        - This is a convenience to ensure that the lights stay off until
          the automation becomes inactive, or until you turn the lights back on
          using the light switch
        - The automation remains active whilst in pause state, with the usual
          rules in place regarding when the automation becomes inactive
        - Pause state is stored in an `input_boolean` helper
        - You must create this helper outside of the automation
      - Scenes
        - The turning on and off of lights and other entities are all handled
          via Home Assistant Scenes
        - Scenes are versatile - you define them outside of the automation, and
          you can add many entities of varying types
        - We use two scenes to control entities related to lights turning on,
          one for day time (Day Scene) and another for night time (Night Scene).
          In simple terms these are used to turn on your lights, however what
          you choose to do with the scenes is under your control
        - We use one scene to control entities when the lights are turned off
          (Off Scene). This is typically used to turn off your lights
        - In addition, we have an optional scene that can be called when the
          automation becomes active (Active Scene), and another optional scene
          that gets called when the automation becomes inactive (Inactive Scene)
        - Note that these optional scenes fire at subtly different times to the
          on and off scenes, as e.g. the Off scene will fire when the automation
          becomes paused. The Inactive scene does not fire at this point,
          because the automation remains active when this happens
      - Countdown Timer
        - Lights turning off (and automation becoming inactive) are triggered by
          the room becoming unoccupied
          However, the lights do not immediately go out when occupancy clears
        - Instead, a timer is started
        - When the timer reaches zero, the lights are turned off, and the
          automation becomes inactive
        - If occupancy recurs before the countdown completes, then the countdown
          is terminated
        - You can set different timer durations during day and night hours
        - The timer is designed to smooth out short periods of no occupancy
          being detected. Perhaps your room gets regular footfall and you don't
          want the lights to constantly be turned off and on, or maybe your
          occupancy sensor can be a little poor at detecting people who are
          sitting down for a while...
        - You must create your timer helper outside of the automation
      - Restrict Hours
        - You can optionally enable config to restrict the hours between which
          the automation can activate
        - The hours you specify can be across two days if needed
      - Restrict to Low Lux
        - You can optionally enable config to restrict the activation of the
          automation to times when the lux level in the room is below a
          given value
        - This convenient function allows you to ensure that your lights only
          come on during daylight if for some reason the room is unusually dark
    </details>
  domain: automation
  input:
    input_sensors:
      name: Input Sensors (Required)
      description: >
        The following sensors are the primary input triggers for your
        automation.<br>
        The automation will activate when occupancy or motion is detected, or when
        someone presses the light switch.<br>
        *Tip: If you have more than one sensor, create a group helper and
        then use that here.*
      icon: mdi:home-import-outline
      collapsed: true
      input:
        occupancy_sensor:
          name: Occupancy Sensor (Required)
          description: >
            The binary sensor detecting occupancy or motion.<br>
          selector:
            entity:
              domain:
                - binary_sensor
              device_class:
                - occupancy
                - motion
              multiple: false
              reorder: false
        light_switch:
          name: Light Switch (Required)
          description: The physical light switch used for manual control.
          selector:
            entity:
              domain:
                - switch
                - light
              multiple: false
              reorder: false
        additional_input_entity:
          name: Additional Input (Optional)
          description: >
            Need an additional entity to be `true` in order for the automation
            to activate? Specify it here. <br>
            For example an `input_boolean` could be used to signify that the
            automation is enabled.
          default:
          selector:
            entity:
              domain:
                - binary_sensor
                - input_boolean
              multiple: false
              reorder: false
    state_helpers:
      name: State Helpers (Required)
      description: >
        The following two entities are used by the automation to hold state.<br>
        You need to define these entities yourself, as `input_boolean` (Toggle)
        helpers.
      icon: mdi:state-machine
      collapsed: true
      input:
        helper_active:
          name: Active Status Helper (Required)
          description: >
            e.g. `input_boolean.<room_name>_brilliant_lights_active`
          selector:
            entity:
              domain:
                - input_boolean
              multiple: false
              reorder: false
        helper_paused:
          name: Pause Status Helper (Required)
          description: >
            e.g. `input_boolean.kitchen_sensor_lights_paused`
          selector:
            entity:
              domain:
                - input_boolean
              multiple: false
              reorder: false
    scenes_and_times:
      name: Scenes And Times of Day to Use them
      description: >
        Light settings are configured using `scene` objects.<br>
        We need scenes that control the light settings both when
        the lights are `on` and `off`. In additon, we split the `on`
        state into day time and night time with associated times when
        these scenes are active.<br>
        Note that you can use the same scene for both day time and
        night time if you wish.<br>
        We also have optional scenes to run when the automation
        becomes active or inactive. Note these are subtly different
        from `on` and `off` - for instance the automation remains active
        when the lights are in the paused state. If you don't need these
        optional scenes, just leave them blank.
      icon: mdi:palette
      collapsed: true
      input:
        time_day_start:
          name: Day Scene Start Time
          description: Time when "Day Scene" becomes active.
          default: '07:00:00'
          selector:
            time: {}
        day_scene:
          name: Day Scene
          description: Holds the light combinations to use during day time hours
          selector:
            entity:
              domain:
                - scene
              multiple: false
              reorder: false
        time_night_start:
          name: Night Scene Start Time
          description: Time when "Night Scene" becomes active.
          default: '22:00:00'
          selector:
            time: {}
        night_scene:
          name: Night Scene
          description: >
            Holds the light combinations to use during night time hours
          selector:
            entity:
              domain:
                - scene
              multiple: false
              reorder: false
        off_scene:
          name: Off Scene
          description: >
            Holds the light combinations to use when the lights should be
            turned off
          selector:
            entity:
              domain:
                - scene
              multiple: false
              reorder: false
        active_scene:
          name: Automation Active Scene (optional)
          description: >
            Scene to run when the automation becomes active
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
        inactive_scene:
          name: Automation Inactive Scene (optional)
          description: >
            Scene to run when the automation becomes inactive
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
    countdown:
      name: Countdown Timer And Durations
      description: >
        When occupancy times out, a countdown timer is started.<br>
        When the timer completes, the lights are switched off and the
        automation becomes inactive.<br>
        You may choose different timer durations during day and night hours.
      icon: mdi:timer-check
      collapsed: true
      input:
        helper_timer:
          name: Timer Helper (Required)
          description: >
            Used to count down time between occupancy clearing and the lights
            switching off.
          selector:
            entity:
              domain:
                - timer
              multiple: false
              reorder: false
        delay_day:
          name: Timer Duration - Day
          description: >
            Delay between occupancy clearing and lights turning off during the
            day.
          default: 2
          selector:
            number:
              min: 0
              max: 30
              unit_of_measurement: minutes
              step: 0.5
              mode: slider
        delay_night:
          name: Timer Duration - Night
          description: >
            Delay between occupancy clearing and lights turning off during the
            night.
          default: 1
          selector:
            number:
              min: 0
              max: 30
              unit_of_measurement: minutes
              step: 0.5
              mode: slider
    restricted_hours:
      name: Restrict Hours
      description: >
        Only want your lights to come on between specific hours?<br>
        Enable this section and specify the time range you'd like the
        automation to be active.<br>
        _Note: the hours can straddle two days if needed._
      icon: mdi:clock-check
      collapsed: true
      input:
        restrict_hours_enabled:
          name: Enable Restricted Hours
          default: false
          selector:
            boolean: {}
        restricted_hours_from:
          name: Enabled From
          description: Time from which the automation is active
          default: '16:00:00'
          selector:
            time: {}
        restricted_hours_until:
          name: Enabled Until
          description: Time until which the automation is active
          default: '23:00:00'
          selector:
            time: {}
    low_lux:
      name: Restrict to Low Lux
      description: >
        Don't want your lights to come on when it is bright daylight?<br>
        Enable this section to restrict automation activation to times when
        the lux levels in the room are below a given threshold.
      icon: mdi:brightness-4
      collapsed: true
      input:
        low_lux_enabled:
          name: Enable Low Lux
          default: false
          selector:
            boolean: {}
        illuminance_sensor:
          name: Illuminance Sensor
          description: The sensor providing the lux value for the room
          default: []
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - illuminance
              multiple: false
              reorder: false
        illuminance_threshold:
          name: Illuminance Threshold
          description: Threshold below which the automation will activate
          default: 15
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: lx
              step: 1
              mode: slider
  source_url: >
    https://raw.githubusercontent.com/sprockers/homeassistant-blueprints/refs/heads/main/brilliant-lights.yaml
mode: single
trigger:
  - platform: state
    entity_id: !input occupancy_sensor
    to: 'on'
    id: Occupancy
  - platform: state
    entity_id: !input occupancy_sensor
    to: 'off'
    id: Occupancy Cleared
  - platform: state
    entity_id: !input light_switch
    to: 'on'
    id: Light Switch On
  - platform: state
    entity_id: !input light_switch
    to: 'off'
    id: Light Switch Off
  - platform: state
    entity_id: !input occupancy_sensor
    to: 'off'
    for:
      minutes: 15
    id: Occupancy Cleared 15m
  - platform: state
    entity_id: !input helper_timer
    from: active
    to: idle
    id: Timer Completed
action:
  - if:
      - condition: or
        conditions:
          - condition: template
            value_template: "{{ additional_input_entity | length == 0 }}"
          - condition: template
            value_template: >
              {{ additional_input_entity | length > 0 and
              is_state(additional_input_entity, 'on') }}
    then:
      - choose:
          - conditions:
              - condition: trigger
                id: Occupancy
              - condition: state
                entity_id: !input helper_paused
                state: 'off'
            sequence:
              - if:
                  - condition: and
                    conditions:
                      - condition: or
                        conditions:
                          - condition: template
                            value_template: "{{ not restrict_hours_enabled }}"
                          - condition: and
                            conditions:
                              - condition: template
                                value_template: "{{ restrict_hours_enabled }}"
                              - condition: time
                                after: !input restricted_hours_from
                                before: !input restricted_hours_until
                      - condition: or
                        conditions:
                          - condition: template
                            value_template: "{{ not low_lux_enabled }}"
                          - condition: and
                            conditions:
                              - condition: template
                                value_template: "{{ low_lux_enabled }}"
                              - condition: template
                                value_template: >
                                  {{ states(illuminance_sensor)|float <
                                  illuminance_threshold|float }}
                then:
                  - if:
                      - condition: time
                        after: !input time_day_start
                        before: !input time_night_start
                    then:
                      - action: scene.turn_on
                        metadata: {}
                        target:
                          entity_id: !input day_scene
                        data: {}
                    else:
                      - action: scene.turn_on
                        metadata: {}
                        target:
                          entity_id: !input night_scene
                        data: {}
                  - action: input_boolean.turn_on
                    metadata: {}
                    target:
                      entity_id: !input helper_active
                    data: {}
                  - if:
                      - condition: template
                        value_template: "{{ active_scene | length > 0 }}"
                    then:
                      - action: scene.turn_on
                        metadata: {}
                        target:
                          entity_id: !input active_scene
                        data: {}
              - if:
                  - condition: state
                    entity_id: !input helper_timer
                    state:
                      - active
                then:
                  - action: timer.pause
                    metadata: {}
                    target:
                      entity_id: !input helper_timer
                    data: {}

          - conditions:
              - condition: trigger
                id: Occupancy Cleared
              - condition: state
                entity_id: !input helper_active
                state: 'on'
            sequence:

              - if:
                  - condition: state
                    entity_id: !input helper_paused
                    state:
                      - "off"
                    enabled: true
                  - condition: time
                    after: !input time_day_start
                    before: !input time_night_start
                then:
                  - action: timer.start
                    metadata: {}
                    target:
                      entity_id: !input helper_timer
                    data:
                      duration: >-
                        00:{{ delay_day }}:00
                else:
                  - action: timer.start
                    metadata: {}
                    target:
                      entity_id: !input helper_timer
                    data:
                      duration: >-
                        00:{{ delay_night }}:00

          - conditions:
              - condition: trigger
                id: Light Switch Off
            sequence:
              - if:
                  - condition: state
                    entity_id: !input helper_active
                    state:
                      - "on"
                then:
                  - action: input_boolean.turn_on
                    metadata: {}
                    target:
                      entity_id: !input helper_paused
                    data: {}
              - action: scene.turn_on
                metadata: {}
                target:
                  entity_id: !input off_scene
                data: {}

          - conditions:
              - condition: trigger
                id: Light Switch On
            sequence:
              - if:
                  - condition: state
                    entity_id: !input helper_paused
                    state:
                      - "on"
                then:
                  - action: input_boolean.turn_off
                    metadata: {}
                    target:
                      entity_id: !input helper_paused
                    data: {}
              - action: scene.turn_on
                metadata: {}
                target:
                  entity_id: !input day_scene
                data: {}
              - action: input_boolean.turn_on
                metadata: {}
                target:
                  entity_id: !input helper_active
                data: {}
              - if:
                  - condition: template
                    value_template: "{{ active_scene | length > 0 }}"
                then:
                  - action: scene.turn_on
                    metadata: {}
                    target:
                      entity_id: !input active_scene
                    data: {}
              - if:
                  - condition: state
                    entity_id: !input occupancy_sensor
                    state:
                      - "off"
                then:
                  - action: timer.start
                    metadata: {}
                    target:
                      entity_id: !input helper_timer
                    data:
                      duration: >-
                        00:{{ delay_day }}:00

          - conditions:
              - condition: trigger
                id: Occupancy Cleared 15m
            sequence:
              - action: scene.turn_on
                metadata: {}
                target:
                  entity_id: !input off_scene
                data: {}
              - action: input_boolean.turn_off
                metadata: {}
                target:
                  entity_id:
                    - !input helper_paused
                    - !input helper_active
                data: {}
              - if:
                  - condition: template
                    value_template: "{{ inactive_scene | length > 0 }}"
                then:
                  - action: scene.turn_on
                    metadata: {}
                    target:
                      entity_id: !input inactive_scene
                    data: {}

          - conditions:
              - condition: trigger
                id: Timer Completed
            sequence:
              - action: input_boolean.turn_off
                metadata: {}
                target:
                  entity_id:
                    - !input helper_paused
                    - !input helper_active
                data: {}
              - action: scene.turn_on
                metadata: {}
                target:
                  entity_id: !input off_scene
                data: {}
              - if:
                  - condition: template
                    value_template: "{{ inactive_scene | length > 0 }}"
                then:
                  - action: scene.turn_on
                    metadata: {}
                    target:
                      entity_id: !input inactive_scene
                    data: {}

variables:
  delay_day: !input delay_day
  delay_night: !input delay_night
  restrict_hours_enabled: !input restrict_hours_enabled
  low_lux_enabled: !input low_lux_enabled
  illuminance_sensor: !input illuminance_sensor
  illuminance_threshold: !input illuminance_threshold
  additional_input_entity: !input additional_input_entity
  active_scene: !input active_scene
  inactive_scene: !input inactive_scene
