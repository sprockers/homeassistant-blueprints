---
blueprint:
  name: Brilliant Lights
  author: Chris Wood
  description: >
    # Brilliant Lights


    *Version: 0.9.11*<p>


    A stateful lighting scene controller which triggers
    from occupancy and light-related entities.<p>


    <details>


    - **Input Entities:**
      - Occupancy/motion `binary_sensor` entity or group helper
        - _Best practice: If you have more than one occupancy
          sensor in the room, use a Binary Sensor Group Helper_
        - This is the primary trigger for turning your lights on and off
        - The automation activates when occupancy is detected
        - The automation stays active until occupancy clears
        - Time and lux level restrictions can be applied to the
          occupancy trigger, limiting when the automation activates
      - Light-related `switch` or `light` entity or group helper
        - _Best practice: A Light Group Helper containing the lights you
          use in your scenes_. Why? A group of lights will change state
          when any other entity related to the lights is triggered, for
          example a smart switch. Using a light group ensures we capture
          as many state changes for the automation as possible
        - A state change in the light-related entity acts as a trigger
          for the automation
        - If the automation was inactive and we are within any restrictions
          then it is activated
        - If inactive but restrictions would prevent activation, then the
          action depends on a setting in the time restriction section.
          You can choose to either allow the automation to activate, or
          instead the automation stays out of the way, giving you manual
          control of the lights
        - If the automation was already active, then it is paused
        - If the automatiomn was paused, then it un-pauses
        - This trigger works regardless of any time or low lux restrictions
          ensuring that you can always turn on and off you lights
        - See Key Concepts below for definitions of active and paused states
      - An optional `binary_sensor` or `input_boolean` entity or group helper
        - The automation will only activate if this input is `true`/`on`


    - **Key Concepts:**
      - Active State
        - Automation activates when triggers cause the lights to turn on
        - Automation remains active until occupancy is clear and (optionally)
          the timer has counted down to zero
        - Active state is stored in an `input_boolean` helper
        - You must define this helper outside of the automation
        - Whilst the automation remains active (and your lights remain on) for
          some time, the automation itself only runs for short periods to
          process triggers and run actions, completing the automation run
          each time
      - Pause State
        - The automation is paused if you turn off the lights using the light-
          related entity whilst the automation is active
        - This is a convenience to ensure that the lights stay off until
          the automation becomes inactive, or until you turn the lights back on
          using the light-related entity in the UI
        - The automation remains active whilst in pause state, with the usual
          rules in place regarding when the automation becomes inactive
        - Pause state is stored in an `input_boolean` helper
        - You must create this helper outside of the automation
      - Scenes
        - The turning on and off of lights and other entities are all handled
          via Home Assistant Scenes
        - Scenes are versatile - you define them outside of the automation, and
          you can add many entities of varying types - not just lights!
        - We use two scenes to control entities related to lights turning on,
          one for day time (Day Scene) and another for night time (Night Scene).
          In simple terms these are used to turn on your lights, however what
          you choose to do with the scenes is under your control
        - We use one scene to control entities when the lights are turned off
          (Off Scene). This is typically used to turn off your lights
        - The above three scenes must all be specified
        - In addition we have a series of optional scenes that fire when
          various events trigger in the automation
        - The names of these scenes in the UI help you understand when they get
          triggered
        - By using these optional scenes you can create sophisticated lighting
          patterns
        - Scenes are switched between at their respective times of day if the
          automation is active
      - Countdown Timer (Optional)
        - Lights turning off (and automation becoming inactive) are triggered by
          the room becoming unoccupied
        - However, with this option enabled the lights do not immediately go
          out when occupancy clears
        - Instead, a countdown timer is started
        - When the timer reaches zero, the lights are turned off, and the
          automation becomes inactive
        - If occupancy recurs before the countdown completes, then the countdown
          is terminated, and the automation stays active
        - You can set different timer durations during day and night hours
        - The timer is designed to smooth out short periods of no occupancy
          being detected. Perhaps your room gets regular footfall and you don't
          want the lights to constantly be turned off and on, or maybe your
          occupancy sensor can be a little poor at detecting people who are
          sitting down for a while...
        - You must create your timer helper outside of the automation
      - Restrict Hours (Optional)
        - You can optionally enable config to restrict the hours between which
          the automation can activate via the occupancy trigger
        - You can choose between a specific set of hours, dusk until dawn or
          a full week schedule entity
        - If you choose the specific hours option then the hours you specify
          can be across two days if needed
        - The dusk until dawn option changes operating hours with the seasons,
          and you can fine-tune dusk and dawn offset times
        - The schedule entity allows you almost limitless control over the times
          at which the automation can activate, including multiple time slots
          per day, and different slots for each day of the week
        - By default at the end of the restricted time block the automation will
          become inactive, but the lights will stay on if there is still
          occupancy detected. This is a courtesy to those present in the room to
          ensure they are not plunged into darkness
        - You can optionally choose for the lights to turn off at the end of the
          restricted time block instead
      - Restrict to Low Lux (Optional)
        - You can optionally enable config to restrict the activation of the
          automation from occupancy to times when the lux level in the room is
          below a given value
        - This convenient function allows you to ensure that your lights only
          come on during daylight if for some reason the room is unusually dark
      - Allow automation activation outside of restricted time block when
        light-related entity changes state
        - By default, if you change the state of the light-related entity when
          the automation is inactive and outside of a restricted time block, the
          automation will activate, and will use its usual rules regarding when
          to become inactive again
        - You can optionally change this setting so that in the above scenario
          the automation does not activate, leaving the light-related entity
          under your manual control for on/off events
        - Whichever option you chose, changing the state of the light-related
          entity will always result in your lights turning on or off in an
          intuitive way
    </details>
  domain: automation
  input:
    input_sensors:
      name: Input Entities (Required)
      description: >
        The following entities are the primary input triggers for your
        automation.<br>
        The automation will activate when occupancy is detected, or
        when the state of the light-related entity changes.<br>
      icon: mdi:home-import-outline
      collapsed: true
      input:
        occupancy_sensor_entity:
          name: Occupancy Sensor (Required)
          description: >
            The binary sensor detecting occupancy or motion.<br>
            _Best practivce: If you have more than one occupancy sensor, create
            a Binary Sensor Group Helper which contains all of your occupancy
            sensors_
          selector:
            entity:
              domain:
                - binary_sensor
              device_class:
                - occupancy
                - motion
              multiple: false
              reorder: false
        light_switch_entity:
          name: Light Group or Other Light-Related Entity (Required)
          description: >
            _Best Practice: Use a Light Group Helper, which contains all of the
            light entities you control with scenes in this room_<br>
            This could also be an individual light or switch entity.<br>
            The entity provided acts as a trigger for the automation. In other
            words, if you turn the light on or off via the UI, or with a smart
            switch then the automation will trigger and act appropriately.
          selector:
            entity:
              domain:
                - switch
                - light
              multiple: false
              reorder: false
        additional_input_entity:
          name: Additional Input (Optional)
          description: >
            Need an additional entity to be `true` in order for the automation
            to activate? Specify it here. <br>
            For example an `input_boolean` could be used to signify that the
            automation is enabled.
          default:
          selector:
            entity:
              domain:
                - binary_sensor
                - input_boolean
              multiple: false
              reorder: false
    state_helpers:
      name: State Helpers (Required)
      description: >
        The following two entities are used by the automation to hold state.<br>
        You need to define these entities yourself, as `input_boolean` (Toggle)
        helpers.
      icon: mdi:state-machine
      collapsed: true
      input:
        active_status_entity:
          name: Active Status Helper (Required)
          description: >
            e.g. `input_boolean.<room_name>_brilliant_lights_active`
          selector:
            entity:
              domain:
                - input_boolean
              multiple: false
              reorder: false
        paused_status_entity:
          name: Pause Status Helper (Required)
          description: >
            e.g. `input_boolean.kitchen_sensor_lights_paused`
          selector:
            entity:
              domain:
                - input_boolean
              multiple: false
              reorder: false
    scenes_and_times:
      name: Scenes And Times of Day to Use Them (Required)
      description: >
        Light settings are configured using `scene` objects.<br>
        We need scenes that control the light settings both when
        the lights are `on` and `off`. In additon, we split the `on`
        state into day time and night time with associated times when
        these scenes are active.<br>
      icon: mdi:palette
      collapsed: true
      input:
        time_day_start:
          name: Day Scene Start Time (Required)
          description: Time when "Day Scene" becomes active.
          default: '07:00:00'
          selector:
            time: {}
        day_scene:
          name: Day Scene (Required)
          description: Holds the light combinations to use during day time hours
          selector:
            entity:
              domain:
                - scene
              multiple: false
              reorder: false
        time_night_start:
          name: Night Scene Start Time (Required)
          description: Time when "Night Scene" becomes active.
          default: '22:00:00'
          selector:
            time: {}
        night_scene:
          name: Night Scene (Required)
          description: >
            Holds the light combinations to use during night time hours<br>
            _Note: if you wish to use the same scene settings 24 hours per day
            simply use the same scene here as you used for Day Scene above_
          selector:
            entity:
              domain:
                - scene
              multiple: false
              reorder: false
        off_scene:
          name: Off Scene (Required)
          description: >
            Holds the light combinations to use when the lights should be
            turned off
          selector:
            entity:
              domain:
                - scene
              multiple: false
              reorder: false
    debounce:
      name: Debounce Lockout (Optional)
      description: >
        After each scene change event, the automation has a short
        lock-out period, during which new triggers will not be
        processed.<br>
        This 'debounce' period is required for the automation to work
        reliably, due to us using a light-related entity as an input.<p>
        Think about it like this: When occupancy clearing results in
        the lights being turned off, that in turn results in a
        toggle trigger of the light-related entity. If we allowed that
        to be processed, it would result in the lights being turned
        on again immediately.<p>
        The length of the debounce lockout can be fine-tuned here
      icon: mdi:lock-check
      collapsed: true
      input:
        debounce_lockout_period:
          name: Debounce Lockout period
          default: 2
          selector:
            number:
              min: 0.5
              max: 5
              step: 0.5
              unit_of_measurement: seconds
              mode: slider
    optional_scenes:
      name: Additional Scenes (Optional)
      description: >
        Beyond the required Day, Night and Off scene triggers, there are a
        number of other trigger points in the automation that you may want
        to leverage.<br>
        For instance, imagine your occupancy sensor has a controllable LED.
        When the automation actives, you could turn on the LED, and when it
        becomes inactive, you could turn it off.<br>
        This optional section provides you the ability to run scenes at each
        of the useful state changes in the automation.<br>
        Provide a scene for each of the trigger points you want to control,
        and just leave the others blank.
      icon: mdi:palette
      collapsed: true
      input:
        active_scene:
          name: Automation Active Scene (optional)
          description: >
            Triggers when the automation becomes active
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
        inactive_scene:
          name: Automation Inactive Scene (optional)
          description: >
            Triggers when the automation becomes inactive
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
        occupancy_detected_scene:
          name: Occupancy Detected Scene (optional)
          description: >
            Triggers when occupancy is detected
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
        occupancy_cleared_scene:
          name: OccupancyCleared Scene (optional)
          description: >
            Triggers when occupancy clears
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
        restricted_hours_start_scene:
          name: Restricted Hours Start Scene (optional)
          description: >
            Triggers at the start of a restricted hours period
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
        restricted_hours_end_scene:
          name: Restricted Hours End Scene (optional)
          description: >
            Triggers at the end of a restricted hours period
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
        pause_on_scene:
          name: Automation Paused Scene (optional)
          description: >
            Triggers when the automation becomes paused
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
        pause_off_scene:
          name: Automation Un-paused Scene (optional)
          description: >
            Triggers when the automation becomes un-paused
          default:
          selector:
            entity:
              domain: scene
              multiple: false
              reorder: false
    countdown:
      name: Countdown Timer And Durations (Optional)
      description: >
        Want to delay the lights switching off when occupancy clears?<br>
        Enable this optional section to start a countdown timer upon
        occupancy clearing. You can specify different timer durations
        for day and night time periods.<br>
        You may find this useful if your occupancy sensors are not good
        at observing people who are sitting down, resulting in unexpected
        occupancy timeouts.
      icon: mdi:timer-check
      collapsed: true
      input:
        countdown_timer_enabled:
          name: Countdown Timer Enabled
          default: false
          selector:
            boolean: {}
        countdown_timer_entity:
          name: Timer Helper
          description: >
            Used to count down time between occupancy clearing and the lights
            switching off.
          default:
          selector:
            entity:
              domain:
                - timer
              multiple: false
              reorder: false
        countdown_duration_day:
          name: Timer Duration - Day
          description: >
            Delay between occupancy clearing and lights turning off during the
            day.
          default: '00:02:00'
          selector:
            duration:
              enable_day: false
        countdown_duration_night:
          name: Timer Duration - Night
          description: >
            Delay between occupancy clearing and lights turning off during the
            night.
          default: '00:01:00'
          selector:
            duration:
              enable_day: false
    restricted_hours:
      name: Restrict to Specified Hours (Optional)
      description: >
        Only want your lights to come on between hours of your choosing?<p>
        Enable this section, then choose one of the following three
        time restriction types:


        - Specific Time
          - You choose a single start and end time
            during which the automation can activate.
          - The same time period is used 7 days per week
          - This time period can go across two days if needed, allowing
            overnight activation
        - Dusk Until Dawn
          - The automation can activate between dusk and
            dawn, changing with the seasons
          - You can fine-tune offsets around these start and end times
        - Schedule
          - The option with almost unlimited flexibility!
          - you provide a `schedule` helper entity, in which you define
            the periods across the week in which you wish the automation
            to be active
          - The automation can activate in each period when the schedule
            is in an `on` state


        **This restriction only applies when the automation is triggered
        by occupancy.**<br>
      icon: mdi:clock-check
      collapsed: true
      input:
        restricted_hours_enabled:
          name: Enable Restricted Hours
          default: false
          selector:
            boolean: {}
        restricted_hours_type:
          name: Restriction Type
          default: "specific_time"
          selector:
            select:
              options:
                - label: Specific Time
                  value: specific_time
                - label: Dusk Until Dawn
                  value: dusk_until_dawn
                - label: Schedule
                  value: schedule
              mode: list
        restricted_hours_from:
          name: 'Specific Time: From'
          description: >
            Time from which the automation is active<br>
          default: '16:00:00'
          selector:
            time: {}
        restricted_hours_until:
          name: 'Specific Time: Until'
          description: >
            Time until which the automation is active<br>
          default: '09:00:00'
          selector:
            time: {}
        dusk_time_offset:
          name: 'Dusk Until Dawn: Dusk Offset'
          description: >
            Fine tune when dusk triggers based on an offset from sunset.<br>
            e.g. `-0:30` allows activation from 30 minutes before sunset,
            `+0:45` allows activation from 45 minutes after sunset
          default: '-00:30'
          selector:
            duration:
              allow_negative: true
              enable_second: false
        dawn_time_offset:
          name: 'Dusk Until Dawn: Dawn Offset'
          description: >
            Fine tune when dawn triggers based on an offset from sunrise.<br>
            e.g. `-1:00` prevents activation from one hour before sunrise,
            `+1:30` prevents activation from 90 minutes after sunrise
          default: '00:30'
          selector:
            duration:
              allow_negative: true
              enable_second: false
        restricted_hours_schedule_entity:
          name: 'Schedule: Entity'
          description: >
            `schedule` helper entity containing the times between which
            you'd like the automation to activate.<br>
            You must create this entity outside of the automation.
          default:
          selector:
            entity:
              domain:
                - schedule
              multiple: false
              reorder: false
        off_at_restriction_end:
          name: >
            All time restriction types: Turn lights off at the end of
            a time period?
          description: >
            By default, when the end of a restricted hours time period is
            reached the automation will become inactive, but the lights will
            remain on if the room still has occupancy.<br>
            This is a courtesy feature to prevent people in the room being
            plunged into darkness.<br>
            The consequence is that the lights will not automatically turn
            off when occupancy clears in this scenario.<br>
            Enabling this toggle will turn the lights off instead.<br>
          default: false
          selector:
            boolean: {}
        start_automation_beyond_restricted_hours:
          name: >
            All time restriction types: Activate automation when lights
            manually turned on outside of restricted hours?
          description: >
            By default, if you turn on light controlled by the automation
            when you are not within your restricted hours, the automation
            will activate (but without applying any restrictions).<br>
            This means that the automation will use all of its usual rules
            to determine when to automatically turn off the lights and become
            inactive again.<br>
            If you turn off this setting, then the automation will not activate
            in this scenario, meaning that you must manually control the on/off
            nature of the lights yourself.
          default: true
          selector:
            boolean: {}
    low_lux:
      name: Restrict to Low Lux (Optional)
      description: >
        Don't want your lights to come on when it is bright daylight?<br>
        Enable this section to restrict automation activation to times when
        the lux levels in the room are below a given threshold.<br>
        **This restriction only applies when the automation is triggered
        by occupancy.**<br>
      icon: mdi:brightness-4
      collapsed: true
      input:
        low_lux_enabled:
          name: Enable Low Lux
          default: false
          selector:
            boolean: {}
        illuminance_sensor_entity:
          name: Illuminance Sensor
          description: The sensor providing the lux value for the room
          default:
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - illuminance
              multiple: false
              reorder: false
        illuminance_threshold:
          name: Illuminance Threshold
          description: Threshold below which the automation will activate
          default: 15
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: lx
              step: 1
              mode: slider
  source_url: >
    https://raw.githubusercontent.com/sprockers/homeassistant-blueprints/refs/heads/main/brilliant-lights.yaml
mode: single

variables:
  restricted_hours_enabled: !input restricted_hours_enabled
  restricted_hours_type: !input restricted_hours_type
  off_at_restriction_end: !input off_at_restriction_end
  low_lux_enabled: !input low_lux_enabled
  illuminance_sensor_entity: !input illuminance_sensor_entity
  illuminance_threshold: !input illuminance_threshold
  additional_input_entity: !input additional_input_entity
  active_scene: !input active_scene
  inactive_scene: !input inactive_scene
  occupancy_detected_scene: !input occupancy_detected_scene
  occupancy_cleared_scene: !input occupancy_cleared_scene
  pause_on_scene: !input pause_on_scene
  pause_off_scene: !input pause_off_scene
  countdown_timer_enabled: !input countdown_timer_enabled
  start_automation_beyond_restricted_hours: !input start_automation_beyond_restricted_hours

trigger_variables:
  countdown_timer_enabled: !input countdown_timer_enabled
  countdown_timer_entity: !input countdown_timer_entity
  active_status_entity: !input active_status_entity
  occupancy_sensor_entity: !input occupancy_sensor_entity
  restricted_hours_schedule_entity: !input restricted_hours_schedule_entity
  light_switch_entity: !input light_switch_entity
  debounce_lockout_period: !input debounce_lockout_period
  time_day_start: !input time_day_start
  time_night_start: !input time_night_start
  # add a few seconds onto the day and night scene change times
  # This ensures that if you set a time restriction end time
  # to be the same as a scene change time, then the restriction
  # will fire first and ensure the lights turn off as intended
  time_day_start_debounce: >
    {{ time_day_start |
    as_timedelta + timedelta(seconds=debounce_lockout_period+1) }}
  time_night_start_debounce: >
    {{ time_night_start |
    as_timedelta + timedelta(seconds=debounce_lockout_period+1) }}

triggers:
  # Primary triggers - occupancy/clear/switch toggle
  - trigger: state
    entity_id: !input occupancy_sensor_entity
    to: 'on'
    id: Occupancy
  - trigger: state
    entity_id: !input occupancy_sensor_entity
    to: 'off'
    id: OccupancyCleared
  - trigger: state
    entity_id: !input light_switch_entity
    id: LightStateChange
    variables:
      light_switch_action: "{{ trigger.to_state.state }}"


  # Extra catchall clean up
  - trigger: state
    entity_id: !input occupancy_sensor_entity
    to: 'off'
    for:
      minutes: 15
    id: OccupancyCleared15m

  # Timer completion
  - trigger: template
    value_template: "{{ is_state(countdown_timer_entity, 'idle') }}"
    id: TimerCompleted
  - trigger: template
    value_template: >
      {{ countdown_timer_enabled is false and
      is_state(active_status_entity, "on") and
      is_state(occupancy_sensor_entity, "off") }}
    for: !input countdown_duration_day
    id: TimerCompleted

  # Time Restrictions
  # Turn on
  - trigger: time
    at: !input restricted_hours_from
    id: StartRestrictedHours
  - trigger: sun
    event: sunset
    offset: !input dusk_time_offset
    id: StartRestrictedHours
  - trigger: template
    value_template: >
      {{ is_state(restricted_hours_schedule_entity, 'on')
      if restricted_hours_schedule_entity is not none
      else false }}
    id: StartRestrictedHours
  # Turn off
  - trigger: time
    at: !input restricted_hours_until
    id: EndRestrictedHours
  - trigger: sun
    event: sunrise
    offset: !input dawn_time_offset
    id: EndRestrictedHours
  - trigger: template
    value_template: >
      {{ is_state(restricted_hours_schedule_entity, 'off')
      if restricted_hours_schedule_entity is not none
      else false }}
    id: EndRestrictedHours

  # Change scenes
  - trigger: time
    at: "{{ time_day_start_debounce }}"
    id: TimeDayStart
  - trigger: time
    at: "{{ time_night_start_debounce }}"
    id: TimeNightStart

action:
  - if:
      - condition: or
        conditions:
          - condition: template
            value_template: "{{ additional_input_entity is none }}"
          - condition: template
            value_template: >
              {{ is_state(additional_input_entity, 'on')
              if additional_input_entity is not none
              else false}}
    then:
      - choose:
          - conditions:
              - condition: or
                conditions:
                  - condition: trigger
                    id: Occupancy
                  - condition: trigger
                    id: StartRestrictedHours
                  - condition: trigger
                    id: LightStateChange
            sequence:
              # First process the restriction conditions to determine
              # whether we should be activating the automation
              - variables:
                  restricted_hours_condition: false
                  low_lux_condition: false

              # Process Restricted Hours Condiroons
              - if:
                  - condition: template
                    value_template: "{{ not restricted_hours_enabled }}"
                then:
                  - variables:
                      restricted_hours_condition: true
                else:
                  # Restricted hours enabled options
                  - if:
                      - condition: or
                        conditions:
                          # between specific times
                          - condition: and
                            conditions:
                              - condition: template
                                value_template: >
                                  {{ restricted_hours_type ==
                                  'specific_time' }}
                              - condition: time
                                before: !input restricted_hours_until
                                after: !input restricted_hours_from
                          # from dusk until dawn
                          - condition: and
                            conditions:
                              - condition: template
                                value_template: >
                                  {{ restricted_hours_type ==
                                  'dusk_until_dawn' }}
                              - condition: or
                                conditions:
                                  - condition: sun
                                    after: sunset
                                    after_offset: !input dusk_time_offset
                                  - condition: sun
                                    before: sunrise
                                    before_offset: !input dawn_time_offset
                          # schedule
                          - condition: and
                            conditions:
                              - condition: template
                                value_template: >
                                  {{ restricted_hours_type ==
                                  'schedule' }}
                              - condition: template
                                value_template: >
                                  {{ is_state(
                                  restricted_hours_schedule_entity,'on')
                                  if restricted_hours_schedule_entity
                                  is not none else false }}
                    then:
                      - variables:
                          restricted_hours_condition: true
              # Process Low Lux Conditions
              - if:
                  # Low lux not enabled
                  - condition: template
                    value_template: "{{ not low_lux_enabled }}"
                then:
                  - variables:
                      low_lux_condition: true
                else:
                  - if:
                      # Low lux enabled and below threshold
                      - condition: template
                        value_template: >
                          {{ states(illuminance_sensor_entity)|float <
                          illuminance_threshold|float
                          if illuminance_sensor_entity is not none
                          else false }}
                    then:
                      - variables:
                          low_lux_condition: true

              # Only proceed to activation if:
              # Inactive plus restriction conditions are true - or -
              # Light state change with allow switch - or -
              # Automation is active
              - if:
                  - condition: or
                    conditions:
                      - condition: and
                        conditions:
                          - condition: template
                            value_template: "{{ restricted_hours_condition }}"
                          - condition: template
                            value_template: "{{ low_lux_condition }}"
                      - condition: and
                        conditions:
                          - condition: trigger
                            id: LightStateChange
                          - condition: template
                            value_template: >
                              {{ start_automation_beyond_restricted_hours }}
                      - condition: state
                        entity_id: !input active_status_entity
                        state: "on"
                then:
                  - choose:
                      # Primary activation block:
                      # Occupancy whilst inactive - or -
                      # 0: Light state change to on
                      - conditions:
                          - condition: or
                            conditions:
                              - condition: and
                                conditions:
                                  - condition: state
                                    entity_id: !input occupancy_sensor_entity
                                    state: "on"
                                  - condition: state
                                    entity_id: !input active_status_entity
                                    state: "off"
                              - condition: and
                                conditions:
                                  - condition: trigger
                                    id: LightStateChange
                                  - condition: state
                                    entity_id: !input active_status_entity
                                    state: "off"
                                  - condition: template
                                    value_template: >
                                      {{ light_switch_action == 'on' }}
                        sequence:
                          # Set active status
                          - action: input_boolean.turn_on
                            target:
                              entity_id: !input active_status_entity
                          # Turn on the lights to correct time of day scene
                          - if:
                              - condition: time
                                after: !input time_day_start
                                before: !input time_night_start
                            then:
                              - action: scene.turn_on
                                target:
                                  entity_id: !input day_scene
                            else:
                              - action: scene.turn_on
                                target:
                                  entity_id: !input night_scene
                          # Turn on active_scene, if defined
                          - if:
                              - condition: template
                                value_template: "{{ active_scene is not none }}"
                            then:
                              - action: scene.turn_on
                                target:
                                  entity_id: !input active_scene
                          # Turn on occupancy_detected_scene if defined
                          # plus occupancy
                          - if:
                              - condition: state
                                entity_id: !input occupancy_sensor_entity
                                state: "on"
                              - condition: template
                                value_template: >
                                  {{ occupancy_detected_scene is not none }}
                            then:
                              - action: scene.turn_on
                                target:
                                  entity_id: !input occupancy_detected_scene
                          # Light state change with no occupancy and
                          # timer enabled
                          - if:
                              - condition: trigger
                                id: LightStateChange
                              - condition: state
                                entity_id: !input occupancy_sensor_entity
                                state:
                                  - "off"
                              - condition: template
                                value_template: >
                                  {{ countdown_timer_enabled }}
                            then:
                              - if:
                                  - condition: time
                                    after: !input time_day_start
                                    before: !input time_night_start
                                then:
                                  - action: timer.start
                                    target:
                                      entity_id: !input countdown_timer_entity
                                    data:
                                      duration: !input countdown_duration_day
                                else:
                                  - action: timer.start
                                    target:
                                      entity_id: !input countdown_timer_entity
                                    data:
                                      duration: !input countdown_duration_night

                          - delay: !input debounce_lockout_period
                      # 1: Occupancy whilst active with timer running
                      - conditions:
                          - condition: trigger
                            id: Occupancy
                          - condition: state
                            entity_id: !input active_status_entity
                            state: "on"
                          - condition: template
                            value_template: "{{ countdown_timer_enabled }}"
                          - condition: template
                            value_template: >
                              {{ is_state(countdown_timer_entity, 'active')
                              if countdown_timer_entity is not none
                              else false}}
                        sequence:
                          - action: timer.cancel
                            target:
                              entity_id: !input countdown_timer_entity
                          - delay: !input debounce_lockout_period
                      # 2: Light state change whilst active and not paused
                      - conditions:
                          - condition: trigger
                            id: LightStateChange
                          - condition: state
                            entity_id: !input active_status_entity
                            state: "on"
                          - condition: state
                            entity_id: !input paused_status_entity
                            state: "off"
                        sequence:
                          - action: input_boolean.turn_on
                            target:
                              entity_id: !input paused_status_entity
                          - action: scene.turn_on
                            target:
                              entity_id: !input off_scene
                          - if:
                              - condition: template
                                value_template: >
                                  {{ pause_on_scene is not none }}
                            then:
                              - action: scene.turn_on
                                target:
                                  entity_id: !input pause_on_scene
                          - delay: !input debounce_lockout_period
                      # 3: Light state change whilst active and paused
                      - conditions:
                          - condition: trigger
                            id: LightStateChange
                          - condition: state
                            entity_id: !input active_status_entity
                            state: "on"
                          - condition: state
                            entity_id: !input paused_status_entity
                            state: "on"
                        sequence:
                          - action: input_boolean.turn_off
                            target:
                              entity_id: !input paused_status_entity
                          - if:
                              - condition: time
                                after: !input time_day_start
                                before: !input time_night_start
                            then:
                              - action: scene.turn_on
                                target:
                                  entity_id: !input day_scene
                            else:
                              - action: scene.turn_on
                                target:
                                  entity_id: !input night_scene
                          - if:
                              - condition: template
                                value_template: >
                                  {{ pause_off_scene is not none }}
                            then:
                              - action: scene.turn_on
                                target:
                                  entity_id: !input pause_off_scene
                          - delay: !input debounce_lockout_period
                      # 4: Triggered by restricted time start, no occupancy
                      - conditions:
                          - condition: trigger
                            id: StartRestrictedHours
                          - condition: state
                            entity_id: !input occupancy_sensor_entity
                            state: "off"
                          - condition: template
                            value_template: >
                              {{ restricted_hours_start_scene is not none }}
                        sequence:
                          - action: scene.turn_on
                            target:
                              entity_id: !input restricted_hours_start_scene

          - conditions:
              - condition: trigger
                id: OccupancyCleared
              - condition: state
                entity_id: !input active_status_entity
                state: 'on'
            sequence:
              - if:
                  - condition: state
                    entity_id: !input paused_status_entity
                    state:
                      - "off"
                  - condition: template
                    value_template: "{{ countdown_timer_enabled }}"
                then:
                  # Start countdown timer
                  - if:
                      - condition: time
                        after: !input time_day_start
                        before: !input time_night_start
                    then:
                      - action: timer.start
                        target:
                          entity_id: !input countdown_timer_entity
                        data:
                          duration: !input countdown_duration_day
                    else:
                      - action: timer.start
                        target:
                          entity_id: !input countdown_timer_entity
                        data:
                          duration: !input countdown_duration_night
                  - if:
                      - condition: template
                        value_template: >
                          {{ occupancy_cleared_scene is not none }}
                    then:
                      - action: scene.turn_on
                        target:
                          entity_id: !input occupancy_cleared_scene
                else:
                  # No timer - turn off immediately
                  - action: input_boolean.turn_off
                    target:
                      entity_id:
                        - !input paused_status_entity
                        - !input active_status_entity
                  - action: scene.turn_on
                    target:
                      entity_id: !input off_scene
                  - if:
                      - condition: template
                        value_template: "{{ inactive_scene is not none }}"
                    then:
                      - action: scene.turn_on
                        target:
                          entity_id: !input inactive_scene
                  - delay: !input debounce_lockout_period

          - conditions:
              - condition: trigger
                id: OccupancyCleared15m
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: !input off_scene
              - action: input_boolean.turn_off
                target:
                  entity_id:
                    - !input paused_status_entity
                    - !input active_status_entity
              - if:
                  - condition: template
                    value_template: "{{ inactive_scene is not none }}"
                then:
                  - action: scene.turn_on
                    target:
                      entity_id: !input inactive_scene
              - delay: !input debounce_lockout_period

          - conditions:
              - condition: trigger
                id: TimerCompleted
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id:
                    - !input paused_status_entity
                    - !input active_status_entity
              - action: scene.turn_on
                target:
                  entity_id: !input off_scene
              - if:
                  - condition: template
                    value_template: "{{ inactive_scene is not none }}"
                then:
                  - action: scene.turn_on
                    target:
                      entity_id: !input inactive_scene
              - delay: !input debounce_lockout_period

          - conditions:
              - condition: trigger
                id: EndRestrictedHours
              - condition: template
                value_template: "{{ restricted_hours_enabled }}"
            sequence:
              - if:
                  - condition: state
                    entity_id: !input active_status_entity
                    state: "on"
                then:
                  - action: input_boolean.turn_off
                    target:
                      entity_id:
                        - !input paused_status_entity
                        - !input active_status_entity
                  - if:
                      - condition: template
                        value_template: "{{ off_at_restriction_end }}"
                    then:
                      - action: scene.turn_on
                        target:
                          entity_id: !input off_scene
                  - if:
                      - condition: template
                        value_template: "{{ inactive_scene is not none }}"
                    then:
                      - action: scene.turn_on
                        target:
                          entity_id: !input inactive_scene
              - if:
                  - condition: template
                    value_template: >
                      {{ restricted_hours_end_scene is not none }}
                then:
                  - action: scene.turn_on
                    target:
                      entity_id: !input restricted_hours_end_scene
              - delay: !input debounce_lockout_period

          - conditions:
              - condition: trigger
                id: TimeDayStart
              - condition: state
                entity_id: !input active_status_entity
                state: "on"
              - condition: state
                entity_id: !input paused_status_entity
                state: "off"
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: !input day_scene
              - delay: !input debounce_lockout_period

          - conditions:
              - condition: trigger
                id: TimeNightStart
              - condition: state
                entity_id: !input active_status_entity
                state: "on"
              - condition: state
                entity_id: !input paused_status_entity
                state: "off"
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: !input night_scene
              - delay: !input debounce_lockout_period
